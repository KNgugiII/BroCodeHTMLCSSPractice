<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Margin</title>

        <link rel="stylesheet" href="/Cascading Style Sheets/Margin.css">

    </head>

    <body>
        
        <p> To set the margin all round an element, use margin: 10px</p>

            <div id="div001"> </div>

        <p> To set the margin of an element to the far right, use Margin-left: auto</p>

            <div id="div002"> </div>

        <p> To set the margin of an element to the far left, use Margin-right: auto</p>

            <div id="div003"> </div>

        <p> To set the margin of an element to the centre, use Margin:auto</p>

            <div id="div004"> </div>

    </body>
</html>
